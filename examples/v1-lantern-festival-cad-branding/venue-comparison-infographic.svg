<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="2026 Thailand Lantern Festival venue comparison">
  <defs>
    <style>
      .ttl { font-family: 'Inter','Segoe UI',Helvetica,Arial,sans-serif; font-weight: 800; fill: #0f172a; }
      .sub { font-family: 'Inter','Segoe UI',Helvetica,Arial,sans-serif; font-weight: 400; fill: #475569; }
      .cardLabel { font-family: 'Inter','Segoe UI',Helvetica,Arial,sans-serif; font-weight: 700; fill: #0f172a; }
      .cardDesc { font-family: 'Inter','Segoe UI',Helvetica,Arial,sans-serif; font-weight: 400; fill: #334155; }
      .badge { font-family: 'Inter','Segoe UI',Helvetica,Arial,sans-serif; font-weight: 700; fill: #ffffff; }
      .attrLabel { font-family: 'Inter','Segoe UI',Helvetica,Arial,sans-serif; font-weight: 600; fill: #475569; }
      .attrValue { font-family: 'Inter','Segoe UI',Helvetica,Arial,sans-serif; font-weight: 600; fill: #0f172a; }
      .price { font-family: 'Inter','Segoe UI',Helvetica,Arial,sans-serif; font-weight: 800; fill: #0f172a; }
      .priceCaption { font-family: 'Inter','Segoe UI',Helvetica,Arial,sans-serif; font-weight: 500; fill: #64748b; }
      .footer { font-family: 'Inter','Segoe UI',Helvetica,Arial,sans-serif; font-weight: 400; fill: #94a3b8; }
      .sectionHeader { font-family: 'Inter','Segoe UI',Helvetica,Arial,sans-serif; font-weight: 700; fill: #ffffff; letter-spacing: 0.5px; }
    </style>

    <!-- Icon: star -->
    <symbol id="icon-star" viewBox="0 0 24 24">
      <path d="M12 2.5l2.95 6.0 6.6.95-4.78 4.66 1.13 6.58L12 17.6 6.1 20.7l1.13-6.58L2.45 9.45 9.05 8.5 12 2.5z" fill="#ffffff"/>
    </symbol>
    <!-- Icon: ticket -->
    <symbol id="icon-ticket" viewBox="0 0 24 24">
      <path d="M3 7.5a1.5 1.5 0 011.5-1.5h15A1.5 1.5 0 0121 7.5V10a2 2 0 000 4v2.5a1.5 1.5 0 01-1.5 1.5h-15A1.5 1.5 0 013 16.5V14a2 2 0 000-4V7.5zm12 0v9h2v-9h-2z" fill="#ffffff"/>
    </symbol>
    <!-- Icon: flag -->
    <symbol id="icon-flag" viewBox="0 0 24 24">
      <path d="M5 3.5a1.2 1.2 0 012.4 0V21a1 1 0 11-2 0V13H5V3.5zM8.4 4.2c3-1.6 6.4 1.4 9.6 0 .9-.4 2 .3 2 1.3v6.2c0 .6-.4 1.1-.9 1.3-3.2 1.4-6.7-1.6-9.6 0a1.2 1.2 0 01-1.7-1.1V5.3c0-.5.2-.9.6-1.1z" fill="#ffffff"/>
    </symbol>
    <!-- Icon: dollar (price badge) -->
    <symbol id="icon-dollar" viewBox="0 0 24 24">
      <path d="M12 2v2.2c-2.4.3-4 1.9-4 4 0 4.4 6.4 3.2 6.4 5.6 0 1-.9 1.7-2.4 1.7-1.6 0-2.6-.8-2.6-2.2H7c0 2.4 1.6 4 4 4.4V20h2v-2.3c2.5-.3 4.2-1.8 4.2-4.1 0-4.4-6.4-3.3-6.4-5.6 0-1 .9-1.6 2.2-1.6 1.4 0 2.4.7 2.4 2H17.6c0-2.3-1.5-3.9-3.6-4.2V2h-2z" fill="#ffffff"/>
    </symbol>
    <!-- Icon: people -->
    <symbol id="icon-people" viewBox="0 0 24 24">
      <path d="M8 11a3.5 3.5 0 100-7 3.5 3.5 0 000 7zm8 0a3 3 0 100-6 3 3 0 000 6zm-8 1.5c-3.2 0-6 1.6-6 3.7V19h12v-2.8c0-2.1-2.8-3.7-6-3.7zm8 0c-.5 0-1 .04-1.5.1 1.5.9 2.5 2.2 2.5 3.6V19h6v-2.7c0-2-2.6-3.8-7-3.8z" fill="#ffffff"/>
    </symbol>
    <!-- Icon: bus -->
    <symbol id="icon-bus" viewBox="0 0 24 24">
      <path d="M5 4h14a2 2 0 012 2v10a2 2 0 01-2 2v1.5a1.5 1.5 0 01-3 0V18H8v1.5a1.5 1.5 0 01-3 0V18a2 2 0 01-2-2V6a2 2 0 012-2zm0 4v6h6V8H5zm8 0v6h6V8h-6zM7 16a1 1 0 100-2 1 1 0 000 2zm10 0a1 1 0 100-2 1 1 0 000 2z" fill="#ffffff"/>
    </symbol>
    <!-- Icon: scale (size) -->
    <symbol id="icon-scale" viewBox="0 0 24 24">
      <path d="M4 4h7v7H4V4zm9 0h7v3h-7V4zm0 5h7v11h-7V9zM4 13h7v7H4v-7z" fill="#ffffff"/>
    </symbol>
    <!-- Icon: check -->
    <symbol id="icon-check" viewBox="0 0 24 24">
      <path d="M9 16.2l-3.5-3.5L4 14.2l5 5 11-11-1.5-1.5z" fill="#16a34a"/>
    </symbol>
    <!-- Icon: cross -->
    <symbol id="icon-cross" viewBox="0 0 24 24">
      <path d="M18.3 5.7L12 12l6.3 6.3-1.4 1.4L10.6 13.4 4.3 19.7 2.9 18.3 9.2 12 2.9 5.7l1.4-1.4L10.6 10.6 16.9 4.3z" fill="#dc2626"/>
    </symbol>
    <!-- Decorative lantern -->
    <symbol id="deco-lantern" viewBox="0 0 24 24">
      <path d="M12 2v2M9 4h6M8 6h8a1 1 0 011 1v8a5 5 0 01-10 0V7a1 1 0 011-1zm4 16v2" stroke="#ffffff" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    </symbol>

    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="card0" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fef3e2"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="hdr0" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="hdr1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="hdr2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="800" fill="url(#bgGrad)"/>

  <!-- Decorative lanterns -->
  <g opacity="0.18">
    <use href="#deco-lantern" x="40" y="40" width="36" height="36"/>
    <use href="#deco-lantern" x="1120" y="60" width="40" height="40"/>
    <use href="#deco-lantern" x="100" y="720" width="28" height="28"/>
    <use href="#deco-lantern" x="1080" y="700" width="32" height="32"/>
  </g>

  <!-- Title block -->
  <g aria-label="title">
    <text class="ttl" x="600" y="64" text-anchor="middle" font-size="34">2026 Thailand Lantern Festival: Where to Watch</text>
    <text class="sub" x="600" y="96" text-anchor="middle" font-size="16">Compare the three main Yi Peng sky-lantern venues on Nov 24-25, 2026 in Chiang Mai.</text>
    <line x1="500" y1="114" x2="700" y2="114" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- ====================== Card 1: CAD Heritage ====================== -->
  <g aria-label="CAD Heritage venue">
    <rect x="50" y="150" width="350" height="580" rx="14" ry="14" fill="url(#card0)" stroke="#f59e0b" stroke-width="2"/>
    <!-- header band -->
    <path d="M50,164 a14,14 0 0 1 14,-14 h322 a14,14 0 0 1 14,14 v66 h-350 z" fill="url(#hdr0)"/>
    <text class="sectionHeader" x="225" y="180" text-anchor="middle" font-size="11">PREMIUM</text>
    <text class="badge" x="225" y="208" text-anchor="middle" font-size="22">CAD Heritage</text>

    <!-- icon circle -->
    <circle cx="225" cy="270" r="36" fill="#f59e0b"/>
    <use href="#icon-star" x="201" y="246" width="48" height="48"/>

    <!-- price block -->
    <text class="price" x="225" y="346" text-anchor="middle" font-size="34">from $150</text>
    <text class="priceCaption" x="225" y="368" text-anchor="middle" font-size="12">USD per person</text>

    <!-- divider -->
    <line x1="80" y1="386" x2="370" y2="386" stroke="#fde68a" stroke-width="1.5"/>

    <!-- attributes -->
    <g font-size="13">
      <use href="#icon-scale" x="76" y="406" width="18" height="18"/>
      <rect x="74" y="404" width="22" height="22" rx="5" fill="#f59e0b" opacity="0.0"/>
      <circle cx="85" cy="415" r="11" fill="#f59e0b"/>
      <use href="#icon-scale" x="74" y="404" width="22" height="22"/>
      <text class="attrLabel" x="104" y="419">Scale</text>
      <text class="attrValue" x="370" y="419" text-anchor="end">Large</text>

      <circle cx="85" cy="447" r="11" fill="#f59e0b"/>
      <use href="#icon-check" x="74" y="436" width="22" height="22"/>
      <text class="attrLabel" x="104" y="451">Release</text>
      <text class="attrValue" x="370" y="451" text-anchor="end">Simultaneous</text>

      <circle cx="85" cy="479" r="11" fill="#f59e0b"/>
      <use href="#icon-bus" x="74" y="468" width="22" height="22"/>
      <text class="attrLabel" x="104" y="483">Transport</text>
      <text class="attrValue" x="370" y="483" text-anchor="end">Bus included</text>

      <circle cx="85" cy="511" r="11" fill="#f59e0b"/>
      <use href="#icon-ticket" x="74" y="500" width="22" height="22"/>
      <text class="attrLabel" x="104" y="515">Food / Drink</text>
      <text class="attrValue" x="370" y="515" text-anchor="end">Buffet included</text>

      <circle cx="85" cy="543" r="11" fill="#f59e0b"/>
      <use href="#icon-people" x="74" y="532" width="22" height="22"/>
      <text class="attrLabel" x="104" y="547">Audience</text>
      <text class="attrValue" x="370" y="547" text-anchor="end">Int'l / Brazilian</text>

      <circle cx="85" cy="575" r="11" fill="#f59e0b"/>
      <use href="#icon-star" x="74" y="564" width="22" height="22"/>
      <text class="attrLabel" x="104" y="579">Organization</text>
      <text class="attrValue" x="370" y="579" text-anchor="end">Highly organized</text>
    </g>

    <!-- desc block -->
    <line x1="80" y1="608" x2="370" y2="608" stroke="#fde68a" stroke-width="1.5"/>
    <text class="cardDesc" font-size="12" x="225" y="632" text-anchor="middle">Paid premium experience with the largest</text>
    <text class="cardDesc" font-size="12" x="225" y="650" text-anchor="middle">simultaneous lantern release. Curated</text>
    <text class="cardDesc" font-size="12" x="225" y="668" text-anchor="middle">buffet, shuttle bus, full program.</text>

    <!-- tag -->
    <rect x="130" y="690" width="190" height="28" rx="14" fill="#f59e0b"/>
    <text class="badge" x="225" y="709" text-anchor="middle" font-size="13">Best for first-timers</text>
  </g>

  <!-- ====================== Card 2: Doi Saket ====================== -->
  <g aria-label="Doi Saket venue">
    <rect x="425" y="150" width="350" height="580" rx="14" ry="14" fill="url(#card1)" stroke="#ea580c" stroke-width="2"/>
    <path d="M425,164 a14,14 0 0 1 14,-14 h322 a14,14 0 0 1 14,14 v66 h-350 z" fill="url(#hdr1)"/>
    <text class="sectionHeader" x="600" y="180" text-anchor="middle" font-size="11">MID-TIER</text>
    <text class="badge" x="600" y="208" text-anchor="middle" font-size="22">Doi Saket</text>

    <circle cx="600" cy="270" r="36" fill="#ea580c"/>
    <use href="#icon-ticket" x="576" y="246" width="48" height="48"/>

    <text class="price" x="600" y="346" text-anchor="middle" font-size="34">from $115</text>
    <text class="priceCaption" x="600" y="368" text-anchor="middle" font-size="12">USD per person</text>

    <line x1="455" y1="386" x2="745" y2="386" stroke="#fed7aa" stroke-width="1.5"/>

    <g font-size="13">
      <circle cx="460" cy="415" r="11" fill="#ea580c"/>
      <use href="#icon-scale" x="449" y="404" width="22" height="22"/>
      <text class="attrLabel" x="479" y="419">Scale</text>
      <text class="attrValue" x="745" y="419" text-anchor="end">Medium</text>

      <circle cx="460" cy="447" r="11" fill="#ea580c"/>
      <use href="#icon-check" x="449" y="436" width="22" height="22"/>
      <text class="attrLabel" x="479" y="451">Release</text>
      <text class="attrValue" x="745" y="451" text-anchor="end">Simultaneous</text>

      <circle cx="460" cy="479" r="11" fill="#ea580c"/>
      <use href="#icon-bus" x="449" y="468" width="22" height="22"/>
      <text class="attrLabel" x="479" y="483">Transport</text>
      <text class="attrValue" x="745" y="483" text-anchor="end">Bus included</text>

      <circle cx="460" cy="511" r="11" fill="#ea580c"/>
      <use href="#icon-ticket" x="449" y="500" width="22" height="22"/>
      <text class="attrLabel" x="479" y="515">Food / Drink</text>
      <text class="attrValue" x="745" y="515" text-anchor="end">Buffet included</text>

      <circle cx="460" cy="543" r="11" fill="#ea580c"/>
      <use href="#icon-people" x="449" y="532" width="22" height="22"/>
      <text class="attrLabel" x="479" y="547">Audience</text>
      <text class="attrValue" x="745" y="547" text-anchor="end">Asian / Western</text>

      <circle cx="460" cy="575" r="11" fill="#ea580c"/>
      <use href="#icon-star" x="449" y="564" width="22" height="22"/>
      <text class="attrLabel" x="479" y="579">Organization</text>
      <text class="attrValue" x="745" y="579" text-anchor="end">Organized</text>
    </g>

    <line x1="455" y1="608" x2="745" y2="608" stroke="#fed7aa" stroke-width="1.5"/>
    <text class="cardDesc" font-size="12" x="600" y="632" text-anchor="middle">Paid mid-scale festival with the same</text>
    <text class="cardDesc" font-size="12" x="600" y="650" text-anchor="middle">simultaneous-release magic at a lower</text>
    <text class="cardDesc" font-size="12" x="600" y="668" text-anchor="middle">price point. Buffet + bus included.</text>

    <rect x="505" y="690" width="190" height="28" rx="14" fill="#ea580c"/>
    <text class="badge" x="600" y="709" text-anchor="middle" font-size="13">Best value</text>
  </g>

  <!-- ====================== Card 3: In-Town Public ====================== -->
  <g aria-label="In-Town Public venue">
    <rect x="800" y="150" width="350" height="580" rx="14" ry="14" fill="url(#card2)" stroke="#7c3aed" stroke-width="2"/>
    <path d="M800,164 a14,14 0 0 1 14,-14 h322 a14,14 0 0 1 14,14 v66 h-350 z" fill="url(#hdr2)"/>
    <text class="sectionHeader" x="975" y="180" text-anchor="middle" font-size="11">FREE / DIY</text>
    <text class="badge" x="975" y="208" text-anchor="middle" font-size="22">In-Town Public</text>

    <circle cx="975" cy="270" r="36" fill="#7c3aed"/>
    <use href="#icon-flag" x="951" y="246" width="48" height="48"/>

    <text class="price" x="975" y="346" text-anchor="middle" font-size="34">from $30</text>
    <text class="priceCaption" x="975" y="368" text-anchor="middle" font-size="12">DIY lanterns ~100 THB each</text>

    <line x1="830" y1="386" x2="1120" y2="386" stroke="#ddd6fe" stroke-width="1.5"/>

    <g font-size="13">
      <circle cx="835" cy="415" r="11" fill="#7c3aed"/>
      <use href="#icon-scale" x="824" y="404" width="22" height="22"/>
      <text class="attrLabel" x="854" y="419">Scale</text>
      <text class="attrValue" x="1120" y="419" text-anchor="end">Small</text>

      <circle cx="835" cy="447" r="11" fill="#7c3aed"/>
      <use href="#icon-cross" x="824" y="436" width="22" height="22"/>
      <text class="attrLabel" x="854" y="451">Release</text>
      <text class="attrValue" x="1120" y="451" text-anchor="end">Non-simultaneous</text>

      <circle cx="835" cy="479" r="11" fill="#7c3aed"/>
      <use href="#icon-cross" x="824" y="468" width="22" height="22"/>
      <text class="attrLabel" x="854" y="483">Transport</text>
      <text class="attrValue" x="1120" y="483" text-anchor="end">Not included</text>

      <circle cx="835" cy="511" r="11" fill="#7c3aed"/>
      <use href="#icon-ticket" x="824" y="500" width="22" height="22"/>
      <text class="attrLabel" x="854" y="515">Food / Drink</text>
      <text class="attrValue" x="1120" y="515" text-anchor="end">Street food</text>

      <circle cx="835" cy="543" r="11" fill="#7c3aed"/>
      <use href="#icon-people" x="824" y="532" width="22" height="22"/>
      <text class="attrLabel" x="854" y="547">Audience</text>
      <text class="attrValue" x="1120" y="547" text-anchor="end">Locals / Backpackers</text>

      <circle cx="835" cy="575" r="11" fill="#7c3aed"/>
      <use href="#icon-star" x="824" y="564" width="22" height="22"/>
      <text class="attrLabel" x="854" y="579">Organization</text>
      <text class="attrValue" x="1120" y="579" text-anchor="end">Loose / informal</text>
    </g>

    <line x1="830" y1="608" x2="1120" y2="608" stroke="#ddd6fe" stroke-width="1.5"/>
    <text class="cardDesc" font-size="12" x="975" y="632" text-anchor="middle">Free admission, do-it-yourself vibe.</text>
    <text class="cardDesc" font-size="12" x="975" y="650" text-anchor="middle">Lanterns released throughout the night,</text>
    <text class="cardDesc" font-size="12" x="975" y="668" text-anchor="middle">no schedule, no buffet, no bus.</text>

    <rect x="880" y="690" width="190" height="28" rx="14" fill="#7c3aed"/>
    <text class="badge" x="975" y="709" text-anchor="middle" font-size="13">Best for budget</text>
  </g>

  <!-- Footer -->
  <text class="footer" x="1170" y="780" text-anchor="end" font-size="11">Source: docs.google.com / 2026 Lantern Festival in Thailand</text>
  <text class="footer" x="30" y="780" font-size="11">Festival dates: Nov 24-25, 2026 - Chiang Mai, Thailand</text>
</svg>
